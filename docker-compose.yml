x-server-env: &server_env
  - ./server/.env

x-client-env: &client_env
  - ./client/.env

services:
  ollama:
    image: ollama/ollama:latest
    profiles: ["dev", "prod"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  db:
    image: mysql:8.4
    profiles: ["dev", "prod"]
    env_file: *server_env
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    profiles: ["prod"]
    image: ghcr.io/dannyyol/cvrise-server:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    env_file: *server_env
    volumes:
      - ./server/data:/app/data
    depends_on:
      ollama:
        condition: service_started
      db:
        condition: service_healthy

  client:
    profiles: ["prod"]
    image: ghcr.io/dannyyol/cvrise-client:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    env_file: *client_env
    depends_on:
      - server

  server-init:
    profiles: ["dev"]
    build:
      context: ./server
    env_file: *server_env
    volumes:
      - ./server:/app
      - ./server/data:/app/data
    command: ["sh", "-c", "alembic upgrade heads && python -m src.cli seed"]
    depends_on:
      ollama:
        condition: service_started
      db:
        condition: service_healthy

  server-dev:
    profiles: ["dev"]
    build:
      context: ./server
    ports:
      - "8000:8000"
    env_file: *server_env
    volumes:
      - ./server:/app
      - ./server/data:/app/data
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      server-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started
      db:
        condition: service_healthy

  client-dev:
    profiles: ["dev"]
    build:
      context: ./client
    ports:
      - "3000:3000"
    env_file: *client_env
    environment:
      NODE_ENV: development
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      CI: "true"
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    command: ["sh", "-c", "pnpm install --no-frozen-lockfile && pnpm run generate:templates && pnpm exec next dev -H 0.0.0.0 -p 3000"]
    depends_on:
      - server-dev

volumes:
  ollama:
  client-node-modules:
  mysql-data:
