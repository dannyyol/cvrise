name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy on the VPS (branch, tag, or SHA)
        required: true
        default: main
      image_tag:
        description: GHCR image tag to deploy (commit SHA tag or "latest")
        required: true
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  server:
    name: Server (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall src

  docker-images:
    name: Docker Images (GHCR)
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Metadata (client)
        id: meta_client
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dannyyol/cvrise-client
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build + Push (client)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_client.outputs.tags }}
          labels: ${{ steps.meta_client.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (server)
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dannyyol/cvrise-server
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build + Push (server)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-main:
    name: Deploy (VPS)
    runs-on: ubuntu-latest
    needs: [docker-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Add host key
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_APP_DIR:-}" ] || [ -z "${VPS_SSH_KEY:-}" ] || [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "Missing required secrets: VPS_HOST, VPS_USER, VPS_APP_DIR, VPS_SSH_KEY, GHCR_USERNAME, GHCR_TOKEN (and optionally VPS_PORT)."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$VPS_APP_DIR' DEPLOY_REF='main' IMAGE_TAG='${{ github.sha }}' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -se" <<'EOF'
          set -euo pipefail

          if command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi

          cd "$VPS_APP_DIR"
          git fetch --all
          git checkout "$DEPLOY_REF"
          git reset --hard "origin/$DEPLOY_REF"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export IMAGE_TAG="${IMAGE_TAG:-latest}"
          $DC --profile prod pull
          $DC --profile prod up -d --remove-orphans
          $DC --profile prod ps
          EOF

  deploy-manual:
    name: Deploy (VPS) - Manual
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Add host key
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_APP_DIR:-}" ] || [ -z "${VPS_SSH_KEY:-}" ] || [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "Missing required secrets: VPS_HOST, VPS_USER, VPS_APP_DIR, VPS_SSH_KEY, GHCR_USERNAME, GHCR_TOKEN (and optionally VPS_PORT)."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH (manual)
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$VPS_APP_DIR' DEPLOY_REF='${{ inputs.deploy_ref }}' IMAGE_TAG='${{ inputs.image_tag }}' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -se" <<'EOF'
          set -euo pipefail

          if command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi

          cd "$VPS_APP_DIR"
          git fetch --all 
          git checkout "$DEPLOY_REF"
          if git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
            git reset --hard "origin/$DEPLOY_REF"
          else
            git reset --hard "$DEPLOY_REF"
          fi

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export IMAGE_TAG="${IMAGE_TAG:-latest}"
          $DC --profile prod pull
          $DC --profile prod up -d --remove-orphans
          $DC --profile prod ps
          EOF
