name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy on the VPS (branch, tag, or SHA)
        required: true
        default: main
      image_tag:
        description: GHCR image tag to deploy (commit SHA tag or "latest")
        required: true
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      client_changed: ${{ steps.filter.outputs.client }}
      server_changed: ${{ steps.filter.outputs.server }}
      infra_changed: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            infra:
              - 'docker-compose.yml'
              - '.github/workflows/ci-cd.yml'

  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate templates
        run: pnpm run generate:templates

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  server:
    name: Server (FastAPI)
    runs-on: ubuntu-latest
    env:
      APP_NAME: "CVRise"
      APP_VERSION: "ci"
      API_PREFIX: "/api"
      HOST: "127.0.0.1"
      PORT: "8000"
      DEBUG: "true"
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      CLIENT_BASE_URL: "http://localhost:3000"
      DATABASE_URL: "mysql+aiomysql://ci:ci@localhost/cvrise_ci"
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall src

      - name: Run tests
        run: python -m pytest tests -q

  docker-images:
    name: Docker Images (GHCR)
    runs-on: ubuntu-latest
    needs: [changes, client, server]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: needs.changes.outputs.client_changed == 'true' || needs.changes.outputs.server_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Metadata (client)
        if: needs.changes.outputs.client_changed == 'true'
        id: meta_client
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dannyyol/cvrise-client
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build + Push (client)
        if: needs.changes.outputs.client_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_client.outputs.tags }}
          labels: ${{ steps.meta_client.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_URL=${{ secrets.NEXT_PUBLIC_GITHUB_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (server)
        if: needs.changes.outputs.server_changed == 'true'
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dannyyol/cvrise-server
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build + Push (server)
        if: needs.changes.outputs.server_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip image build
        if: needs.changes.outputs.client_changed != 'true' && needs.changes.outputs.server_changed != 'true'
        run: echo "No client/server changes detected. Skipping Docker build and push."

  deploy-main:
    name: Deploy (VPS)
    runs-on: ubuntu-latest
    needs: [changes, docker-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.outputs.client_changed == 'true' || needs.changes.outputs.server_changed == 'true' || needs.changes.outputs.infra_changed == 'true')
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Add host key
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_APP_DIR:-}" ] || [ -z "${VPS_SSH_KEY:-}" ] || [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "Missing required secrets: VPS_HOST, VPS_USER, VPS_APP_DIR, VPS_SSH_KEY, GHCR_USERNAME, GHCR_TOKEN (and optionally VPS_PORT)."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          CLIENT_CHANGED='${{ needs.changes.outputs.client_changed }}'
          SERVER_CHANGED='${{ needs.changes.outputs.server_changed }}'
          if [ "$CLIENT_CHANGED" = "true" ] || [ "$SERVER_CHANGED" = "true" ]; then
            DEPLOY_IMAGE_TAG='${{ github.sha }}'
          else
            DEPLOY_IMAGE_TAG='latest'
          fi

          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$VPS_APP_DIR' DEPLOY_REF='main' IMAGE_TAG='$DEPLOY_IMAGE_TAG' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' CLIENT_CHANGED='$CLIENT_CHANGED' SERVER_CHANGED='$SERVER_CHANGED' bash -se" <<'EOF'
          set -euo pipefail

          if command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi

          cd "$VPS_APP_DIR"
          git fetch --all
          git checkout "$DEPLOY_REF"
          git reset --hard "origin/$DEPLOY_REF"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export IMAGE_TAG="${IMAGE_TAG:-latest}"

          if [ "${SERVER_CHANGED}" = "true" ]; then
            $DC --profile prod pull server
            $DC --profile prod up -d --no-deps --force-recreate server
          fi

          if [ "${CLIENT_CHANGED}" = "true" ]; then
            $DC --profile prod pull client
            $DC --profile prod up -d --no-deps --force-recreate client
          fi

          if [ "${SERVER_CHANGED}" != "true" ] && [ "${CLIENT_CHANGED}" != "true" ]; then
            $DC --profile prod up -d --remove-orphans
          fi

          $DC --profile prod ps
          EOF

  deploy-manual:
    name: Deploy (VPS) - Manual
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.event_name == 'workflow_dispatch'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Add host key
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_APP_DIR:-}" ] || [ -z "${VPS_SSH_KEY:-}" ] || [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "Missing required secrets: VPS_HOST, VPS_USER, VPS_APP_DIR, VPS_SSH_KEY, GHCR_USERNAME, GHCR_TOKEN (and optionally VPS_PORT)."
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH (manual)
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$VPS_APP_DIR' DEPLOY_REF='${{ inputs.deploy_ref }}' IMAGE_TAG='${{ inputs.image_tag }}' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -se" <<'EOF'
          set -euo pipefail

          if command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi

          cd "$VPS_APP_DIR"
          git fetch --all 
          git checkout "$DEPLOY_REF"
          if git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
            git reset --hard "origin/$DEPLOY_REF"
          else
            git reset --hard "$DEPLOY_REF"
          fi

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export IMAGE_TAG="${IMAGE_TAG:-latest}"
          $DC --profile prod pull
          $DC --profile prod up -d --remove-orphans
          $DC --profile prod ps
          EOF
